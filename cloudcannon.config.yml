source: .

collections_config:
  pages:
    path: src/content/pages
    icon: wysiwyg
    url: "/[slug]/"
    _enabled_editors:
      - visual
    _inputs:
      # Outer page-builder array. Its only block type is the item-list component.
      content_blocks:
        type: array
        options:
          structures: _structures.blocks
      # Inner array (lives on the item-list block). Its items carry a
      # CC-managed _uuid (instance_value) — the only stable id tying an item to
      # its data. No Rosey, no RCC.
      items:
        type: array
        options:
          structures: _structures.item

_structures:
  blocks:
    values:
      - label: Item list
        value:
          _name: item-list
          items: []
  item:
    values:
      - label: List item
        value:
          _uuid:
          label: New item
        _inputs:
          _uuid:
            hidden: false
            instance_value: UUID
          label:
            type: text
